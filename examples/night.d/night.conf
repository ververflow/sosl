# SOSL night orchestrator — global envelope (example)
# Copy this directory, point sosl-night.sh at it:
#   bash sosl-night.sh --plan /path/to/night.d            (scheduled)
#   bash sosl-night.sh --plan /path/to/night.d --force    (day test)
# Values are parsed safely (never sourced); unknown keys are rejected.

NIGHT_ENABLED=true
TARGET_DIR="/path/to/your-repo"

# Hard stops
NIGHT_MAX_TOTAL_COST=5.00     # USD envelope for the whole night
NIGHT_END_BY="06:30"          # no new run starts within 15m of this; running work is killed
NIGHT_RUN_TIMEOUT_MIN=150     # default wallclock cap per run (override per run conf)
NIGHT_STALL_MINUTES=30        # kill a run when log+heartbeat go quiet this long

# Base ref for every run. For a dedicated night clone whose origin is the
# local day repo, use origin/main + NIGHT_FETCH=true: the fetch is disk-local.
NIGHT_BASE_REF="main"
NIGHT_FETCH=false             # fetch origin before basing (never pulls, never pushes)

# Laptop guards
NIGHT_MIN_BATTERY_PCT=20      # skip/abort below this when on battery
NIGHT_REQUIRE_AC=false        # true = never run on battery at all

# Housekeeping
NIGHT_NOTIFY=true             # macOS notification when done/failed
NIGHT_AUTO_SYNC=false         # true = run npm ci / uv sync on lockfile drift (else warn)
