# One night run = one normal sosl.sh --config file (+ RUN_TIMEOUT_MIN).
# Runs execute serially in filename order (10-, 20-, ...).

DOMAIN_DIR="/path/to/your-repo/.sosl/domains/my-metric"
MAX_ITERATIONS=12
MAX_COST_USD=2.00             # clamped further by the night envelope
BUDGET_PER_ITER=0.75          # 0.50 hits budget-aborts on real codebases
MAX_TURNS=50                  # default 15 = error_max_turns on real codebases
SAMPLES=1                     # deterministic metrics need no median-of-5
MODEL="claude-haiku-4-5"      # cheap loop model...
JUDGE_MODEL="claude-sonnet-5" # ...with a stronger reviewer
RUN_TIMEOUT_MIN=60            # hard wallclock cap for this run

# Wake up to a reviewable PR instead of a local branch (optional; needs gh).
# Push/PR failures only warn — the branch always stays available locally.
#AUTO_PR=true
#AUTO_PR_REPO="owner/repo"
#AUTO_PR_BASE="main"          # AUTO_PR_REMOTE defaults to git@github.com:<repo>.git
