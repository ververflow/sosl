# SOSL config — HoutCalc Lighthouse Performance optimization
# Usage: bash sosl.sh --config examples/houtcalc-perf.conf
#
# Replace TARGET_DIR with the path to your HoutCalc checkout
TARGET_DIR="/path/to/houtcalc"
DOMAIN_DIR="domains/performance"
TARGET_URL="http://localhost:3000"
HEALTH_CHECK_URL="http://localhost:3000"

MAX_ITERATIONS=30
MAX_HOURS=8
MAX_COST_USD=20.00
BUDGET_PER_ITER=1.00
SAMPLES=5
MODEL="claude-sonnet-4-5"
