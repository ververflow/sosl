# SOSL config template — copy and customize for your project
# Usage: cp examples/template.conf examples/my-project.conf
#        bash sosl.sh --config examples/my-project.conf

# Required: path to the git repo you want to optimize
TARGET_DIR="/path/to/your/project"

# Required: which domain to optimize (must exist in domains/)
DOMAIN_DIR="domains/performance"

# Optional: URL for Lighthouse-based domains (dev server must be running)
TARGET_URL="http://localhost:3000"
HEALTH_CHECK_URL="http://localhost:3000"
# Optional: comma-separated paths to measure (default: /, bottleneck-first scoring)
# URLS="/,/projects,/settings"

# Loop limits
MAX_ITERATIONS=30          # Stop after N iterations
MAX_HOURS=8                # Stop after N hours
MAX_COST_USD=20.00         # Stop after $N spent on Claude API

# Per-iteration settings
BUDGET_PER_ITER=1.00       # Max cost per Claude call
SAMPLES=5                  # Measurements per evaluation (higher = more reliable, slower)
MODEL="claude-sonnet-4-5"  # Claude model to use
