name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          ignore_paths: 'examples'
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2155
