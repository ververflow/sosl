name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: '.'
          ignore_paths: 'examples'
        env:
          # SC1091: skip "can't follow non-constant source" (dynamic source paths)
          # SC2155: skip "declare and assign separately" (acceptable for our style)
          # SC2034: vars sourced from configs appear unused in the sourcing script
          # SC1090: dynamic source (intentional in our domain loader)
          SHELLCHECK_OPTS: -e SC1091 -e SC2155 -e SC2034 -e SC1090
